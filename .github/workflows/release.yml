# Nexis Controller — Release Pipeline
# Triggered on: VERSION file bump on main, version tags, or workflow_dispatch.

name: Release

on:
  push:
    branches: [main]
    paths: ['VERSION']
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-deb:
    name: Build .deb Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
          else
            V=$(cat VERSION | tr -d 'v \n')
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          PKG="nexis-controller_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/nexis-controller"
          mkdir -p "${PKG}/etc/systemd/system"
          mkdir -p "${PKG}/etc/nexis-controller"
          mkdir -p "${PKG}/usr/local/bin"

          cp nexis_daemon.py "${PKG}/opt/nexis-controller/"
          cp requirements.txt "${PKG}/opt/nexis-controller/" 2>/dev/null || true
          cp nexis-controller.service "${PKG}/etc/systemd/system/" 2>/dev/null || true
          cp nexis "${PKG}/usr/local/bin/nexis"
          chmod 0755 "${PKG}/usr/local/bin/nexis"

          cat > "${PKG}/DEBIAN/control" << EOF
          Package: nexis-controller
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: python3 (>= 3.11), python3-pip, python3-venv, socat
          Maintainer: Nexis Project <noreply@nexis.local>
          Description: Nexis Controller — AI assistant and device management hub
           Part of the Nexis ecosystem. Manages AI conversations, device control,
           and coordinates with Nexis Hypervisor nodes.
          EOF

          cat > "${PKG}/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          set -e
          python3 -m venv /opt/nexis-controller/venv
          /opt/nexis-controller/venv/bin/pip install -q -r /opt/nexis-controller/requirements.txt 2>/dev/null || true
          systemctl daemon-reload
          systemctl enable nexis-controller 2>/dev/null || true
          systemctl restart nexis-controller 2>/dev/null || true
          EOF
          chmod 0755 "${PKG}/DEBIAN/postinst"

          cat > "${PKG}/DEBIAN/prerm" << 'EOF'
          #!/bin/bash
          set -e
          systemctl stop nexis-controller 2>/dev/null || true
          systemctl disable nexis-controller 2>/dev/null || true
          EOF
          chmod 0755 "${PKG}/DEBIAN/prerm"

          dpkg-deb --build "${PKG}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="v${{ steps.ver.outputs.version }}"
          cat > notes.md << EOF
          ## Nexis Controller ${VERSION}

          ### Artefacts
          | File | Description |
          |------|-------------|
          | \`nexis-controller_${{ steps.ver.outputs.version }}_amd64.deb\` | Debian package for Debian 12 systems |

          ### Install
          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/santiagotoro2023/nexis-controller/main/install-nexis-controller.sh | sudo bash
          \`\`\`
          Or install the .deb directly:
          \`\`\`bash
          sudo dpkg -i nexis-controller_${{ steps.ver.outputs.version }}_amd64.deb
          \`\`\`

          Access the web UI at \`https://<host-ip>:8443\` and complete the setup wizard.

          ---
          Part of the [Nexis ecosystem](https://github.com/santiagotoro2023).
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "NeXiS Controller v${{ steps.ver.outputs.version }}"
          body_path: notes.md
          files: |
            nexis-controller_${{ steps.ver.outputs.version }}_amd64.deb
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
